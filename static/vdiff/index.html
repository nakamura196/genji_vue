<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1976d2">
    <link rel="stylesheet" href="vdiffjs/vdiff.bundle.css">
    <link rel="stylesheet" href="vdiffjs-wrapper.css">
    <link rel="stylesheet" href="vdiff-modern.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Material+Icons&display=swap">
    <title>vdiff.js / vdiff.js editor - JavaScript-based visual differencing tool</title>
    <script src="vdiffjs/vdiff.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/spin.js@2.3.2/spin.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/spin.js@2.3.2/jquery.spin.min.js"></script>
  </head>
  <body class="vdiff-modern">
    <header class="vdiff-modern__appbar">
      <div class="vdiff-modern__appbar-left">
        <span class="material-icons vdiff-modern__appbar-icon">compare</span>
        <h1 class="vdiff-modern__title">vdiff.js</h1>
        <span class="vdiff-modern__subtitle" data-ja="画像比較ツール" data-en="Visual differencing">画像比較ツール</span>
      </div>
      <div class="vdiff-modern__appbar-right">
        <button id="vdiff-modern-lang" class="vdiff-modern__icon-btn" title="言語切替 / Language" type="button">
          <span class="material-icons">translate</span>
        </button>
        <button id="vdiff-modern-theme" class="vdiff-modern__icon-btn" title="テーマ切替 / Theme" type="button">
          <span class="material-icons">dark_mode</span>
        </button>
        <button id="vdiff-modern-fullscreen" class="vdiff-modern__icon-btn" title="全画面 / Fullscreen" type="button">
          <span class="material-icons">fullscreen</span>
        </button>
      </div>
    </header>

    <main class="vdiff-modern__main">
      <div id="vdiffjs_wrapper" class="vdiff-modern__wrapper"></div>
    </main>

    <script src="vdiffjs-wrapper.js"></script>
    <script>
      // Pre-resize IIIF Image API URLs in img1/img2 to fit the current viewport.
      // This avoids the slider container overflowing horizontally on mobile and
      // means the library never has to scale the natural image down.
      (function rewriteIiifSize() {
        var url = new URL(location.href);
        var dpr = Math.min(window.devicePixelRatio || 1, 2);
        var w = Math.round(window.innerWidth * dpr);
        var h = Math.round(window.innerHeight * dpr);
        var sizeSeg = '!' + w + ',' + h;
        var qualityRe = /^(default|color|gray|bitonal)\.(jpg|jpeg|png|tif|tiff|gif|webp)$/i;
        var rotationRe = /^!?\d+(\.\d+)?$/;
        var changed = false;
        ['img1', 'img2'].forEach(function(key) {
          var v = url.searchParams.get(key);
          if (!v) return;
          var parts = v.split('/');
          if (parts.length < 5) return;
          if (!qualityRe.test(parts[parts.length - 1])) return;
          if (!rotationRe.test(parts[parts.length - 2])) return;
          if (parts[parts.length - 3] === sizeSeg) return;
          parts[parts.length - 3] = sizeSeg;
          url.searchParams.set(key, parts.join('/'));
          changed = true;
        });
        if (changed) history.replaceState(null, document.title, url.toString());
      })();
      (function() {
        VDiffWrapper({
          id: 'vdiffjs_wrapper'
        });
      })();
    </script>
    <script src="vdiff-modern.js"></script>
    <script src="opencv/opencv-4.5.1.js" async></script>
  </body>
</html>
